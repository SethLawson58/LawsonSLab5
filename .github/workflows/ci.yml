name: CI

on: 
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: '8.0.x'

            - name: Restore dependencies
              run: dotnet restore LawsonSLab6/LawsonSLab6.csproj

            - name: Build
              run: dotnet build LawsonSLab6/LawsonSLab6.csproj --no-restore

            - name: Run tests
              run: dotnet test LawsonSLab6/LawsonSLab6.csproj --no-build --verbosity normal
